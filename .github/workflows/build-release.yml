name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean guano_editor.spec
      
      - name: Create DMG
        run: |
          mkdir dmg_temp
          cp -R "dist/GUANO Metadata Editor.app" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          cat > dmg_temp/README.txt << 'EOF'
          GUANO Metadata Editor
          
          INSTALLATION:
          1. Drag "GUANO Metadata Editor" to Applications
          2. On first launch, right-click and select "Open"
          
          For documentation, visit the GitHub repository.
          EOF
          hdiutil create -volname "GUANO Metadata Editor" \
                         -srcfolder dmg_temp \
                         -ov -format UDZO \
                         "GUANO-Metadata-Editor-macOS.dmg"
          rm -rf dmg_temp
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: GUANO-Metadata-Editor-macOS.dmg
      
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: GUANO-Metadata-Editor-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean guano_editor.spec
      
      - name: Create ZIP
        run: |
          Compress-Archive -Path "dist/GUANO Metadata Editor.exe" -DestinationPath "GUANO-Metadata-Editor-Windows.zip"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: GUANO-Metadata-Editor-Windows.zip
      
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: GUANO-Metadata-Editor-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean guano_editor.spec
      
      - name: Create tar.gz
        run: |
          cd dist
          tar -czf "../GUANO-Metadata-Editor-Linux.tar.gz" "GUANO Metadata Editor"
          cd ..
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: GUANO-Metadata-Editor-Linux.tar.gz
      
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: GUANO-Metadata-Editor-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
